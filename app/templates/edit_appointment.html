{% extends "base.html" %}

{% block content %}
<h1>Edit Appointment</h1>

<form action="/appointments/{{ appointment.id }}/edit" method="POST">
    <label>Title</label>
    <input type="text" name="title" value="{{ appointment.title }}" required>
    <label>Date</label>
    <input type="date" name="date" value="{{ appointment.date }}" required>
    <label>Notes</label>
    <textarea name="notes" rows="3">{{ appointment.notes }}</textarea>
    <button type="submit">Save Changes</button>
</form>

<a href="/">Cancel</a>
{% endblock %}
